<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Répertoire - Tableau de bord</title>
    <link rel="stylesheet" href="style.css?v=7">
    <link rel="stylesheet" href="dashboard.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-address-book"></i>
                <h1>Répertoire</h1>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-tab="pro">
                    <i class="fa-solid fa-briefcase"></i>
                    <span>Professionnel</span>
                </button>
                <button class="nav-item" data-tab="perso">
                    <i class="fa-solid fa-user"></i>
                    <span>Personnel</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <span id="user-greeting">Bonjour</span>
                </div>
                <div class="sidebar-actions">
                    <button id="theme-toggle" class="icon-btn" title="Changer de thème">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <button id="logout-btn" class="icon-btn" title="Se déconnecter" style="color: var(--danger-color);">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-box input-with-icon">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" class="form-input" placeholder="Rechercher un contact...">
                </div>
                <button id="btn-import" class="secondary-btn">
                    <i class="fa-solid fa-file-import"></i> Importer
                </button>
            </header>

            <div class="content-area">
                <div id="favorites-section" class="section hidden">
                    <h2 class="section-title"><i class="fa-solid fa-star" style="color: #fbbf24;"></i> Favoris</h2>
                    <div id="favorites-list" class="contact-grid"></div>
                </div>

                <div class="section">
                    <h2 id="list-title" class="section-title">Contacts Professionnels</h2>
                    <div id="contact-list" class="contact-grid"></div>
                </div>
            </div>

            <!-- Floating Action Button -->
            <button id="btn-add" class="fab-btn" title="Ajouter un contact">
                <i class="fa-solid fa-plus"></i>
            </button>
        </main>
    </div>

    <!-- Add Contact Modal -->
    <div id="modal-add" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Nouveau Contact</h2>
                <button class="close-btn">&times;</button>
            </div>
            <form id="add-contact-form">
                <input type="hidden" id="contact-type" name="type" value="pro">

                <div class="form-group">
                    <label for="name">Nom complet *</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="name" name="name" class="form-input" required
                            placeholder="Ex: Jean Dupont">
                    </div>
                </div>

                <div id="field-company" class="form-group">
                    <label for="company">Entreprise</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-building"></i>
                        <input type="text" id="company" name="company" class="form-input" placeholder="Ex: Google">
                    </div>
                </div>

                <div id="field-position" class="form-group">
                    <label for="position">Poste occupé</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" id="position" name="position" class="form-input"
                            placeholder="Ex: Développeur">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Téléphone</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" id="phone" name="phone" class="form-input" placeholder="06 12 34 56 78">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" name="email" class="form-input"
                                placeholder="jean@example.com">
                        </div>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="is_favorite" name="is_favorite">
                    <label for="is_favorite">Ajouter aux favoris</label>
                </div>

                <div class="modal-footer">
                    <button type="button" class="secondary-btn close-btn">Annuler</button>
                    <button type="submit" class="primary-btn">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Import CSV Modal -->
    <div id="modal-import" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Importer des contacts (CSV)</h2>
                <button class="close-btn">&times;</button>
            </div>
            <form id="import-form">
                <div class="form-group">
                    <label>Destination</label>
                    <div class="radio-group">
                        <label><input type="radio" name="import-type" value="pro" checked> Professionnel</label>
                        <label><input type="radio" name="import-type" value="perso"> Personnel</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="csv-file">Fichier CSV</label>
                    <div style="border: 2px dashed var(--border-color); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.2s;"
                        onmouseover="this.style.borderColor='var(--accent-color)'"
                        onmouseout="this.style.borderColor='var(--border-color)'">
                        <input type="file" id="csv-file" name="file" accept=".csv" required style="width: 100%;">
                        <div style="margin-top: 10px; color: var(--text-secondary); font-size: 0.9rem;">
                            <i class="fa-solid fa-cloud-upload-alt"
                                style="font-size: 2rem; margin-bottom: 10px; display: block;"></i>
                            Glissez votre fichier ici ou cliquez pour parcourir
                        </div>
                    </div>
                    <small style="display: block; margin-top: 10px; color: var(--text-secondary);">Format attendu: Name,
                        Company, Phone, Email, Position</small>
                </div>

                <div class="modal-footer">
                    <button type="button" class="secondary-btn close-btn">Annuler</button>
                    <button type="submit" class="primary-btn">Importer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
