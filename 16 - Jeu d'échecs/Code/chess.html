<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y-CHESS ULTIMATE | BTS SIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#161512] text-[#bababa] font-sans transition-colors duration-500">

    <nav class="bg-[#262421] h-14 flex items-center justify-between px-6 border-b border-white/5 sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <div class="text-blue-500 font-black text-xl tracking-tighter cursor-pointer">♞ Y-CHESS</div>
            <div class="hidden md:flex gap-4 text-xs font-bold uppercase tracking-wider">
                <a href="#" class="hover:text-white transition">Jouer</a>
                <a href="#" class="hover:text-white transition">Apprendre</a>
                <a href="#" class="text-gray-600">Admin_SIO</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="engine-status" class="text-[10px] font-mono text-green-500 bg-green-500/10 px-2 py-1 rounded">MOTEUR_V2_OK</div>
            <button onclick="resetGame()" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-4 py-2 rounded transition shadow-lg">RESET</button>
        </div>
    </nav>

    <main class="container mx-auto py-6 px-4 flex flex-col xl:flex-row gap-6 justify-center items-start">
        
        <aside class="w-full xl:w-64 space-y-4">
            <div class="bg-[#262421] p-4 rounded-lg border border-white/5 shadow-xl">
                <h3 class="text-[11px] font-bold text-gray-500 mb-4 uppercase tracking-widest">Thématisation</h3>
                
                <div class="space-y-4">
                    <div>
                        <span class="text-[10px] block mb-2 opacity-50">PLATEAU</span>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="setTheme('classic')" class="bg-[#b58863] h-8 rounded hover:scale-105 transition"></button>
                            <button onclick="setTheme('ocean')" class="bg-[#6b8bb1] h-8 rounded hover:scale-105 transition"></button>
                            <button onclick="setTheme('forest')" class="bg-[#779556] h-8 rounded hover:scale-105 transition"></button>
                            <button onclick="setTheme('dark')" class="bg-[#444] h-8 rounded hover:scale-105 transition"></button>
                        </div>
                    </div>

                    <div>
                        <span class="text-[10px] block mb-2 opacity-50">SET DE PIÈCES</span>
                        <select id="piece-style" onchange="renderBoard()" class="w-full bg-[#161512] border border-white/10 p-2 rounded text-xs outline-none">
                            <option value="wikipedia">Wikipedia (Standard)</option>
                            <option value="neo">Neo (Moderne)</option>
                        </select>
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex flex-col items-center gap-4">
            <div id="board" class="w-[320px] h-[320px] md:w-[580px] md:h-[580px] bg-[#2a2825] shadow-2xl rounded-sm"></div>
        </div>

        <aside class="w-full xl:w-72 space-y-4">
            <div class="bg-[#262421] p-4 rounded-lg border border-white/5">
                <label class="text-[11px] font-bold text-gray-500 uppercase block mb-3 tracking-widest">Niveau IA (Bot)</label>
                <select id="difficulty" class="w-full bg-[#161512] p-2 rounded border border-white/10 text-xs text-blue-400 font-bold outline-none">
                    <option value="1">FACILE (SIO 1)</option>
                    <option value="2">MOYEN (SIO 2)</option>
                    <option value="3">DIFFICILE (EXPERT)</option>
                    <option value="4">GOAT (MAGNUS)</option>
                </select>
            </div>

            <div class="bg-[#262421] rounded-lg border border-white/5 flex flex-col h-[380px] overflow-hidden">
                <div class="p-3 border-b border-white/5 bg-white/5 font-bold text-[10px] uppercase tracking-widest text-gray-500">
                    Console de Notation
                </div>
                <div id="move-history" class="flex-1 overflow-y-auto p-4 font-mono text-[12px] space-y-1 text-blue-300 scrollbar-custom">
                    </div>
            </div>
        </aside>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
